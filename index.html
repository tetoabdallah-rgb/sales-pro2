<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

function rAcct(){var au=ld('sp_auth')||{},st=ld('sp_settings')||{};$('M').innerHTML='<div class="ph"><h1>👤 '+t('account')+' & Settings</h1></div><div class="card" style="text-align:center;max-width:480px"><div class="acc-av">👤</div><h3 style="font-size:1.4rem;margin-bottom:24px;">'+(st.name||au.u||'User')+'</h3><div class="fg"><label>Name</label><input id="acN" value="'+(st.name||'')+'"></div><div class="fg"><label>Email</label><input id="acE" value="'+(st.email||'')+'"></div><div class="fg"><label>'+(L==='ar'?'حجم الخط':'Font Size')+'</label><select id="acF" class="sbox"><option value="70%" '+(st.fontScale==='70%'?'selected':'')+'>صغير (70%)</option><option value="80%" '+((!st.fontScale||st.fontScale==='80%')?'selected':'')+'>متوسط (80%) - الافتراضي</option><option value="90%" '+(st.fontScale==='90%'?'selected':'')+'>كبير (90%)</option><option value="100%" '+(st.fontScale==='100%'?'selected':'')+'>كبير جداً (100%)</option></select></div><div class="fg"><label>'+(L==='ar'?'عرض الصفحة':'Layout Width')+'</label><select id="acW" class="sbox"><option value="100%" '+((!st.viewWidth||st.viewWidth==='100%')?'selected':'')+'>عرض كامل (Full)</option><option value="1200px" '+(st.viewWidth==='1200px'?'selected':'')+'>متوسط (Centered 1200px)</option></select></div><button class="btn btn-p" id="acS" style="width:100%;margin:12px 0;">'+(L==='ar'?'حفظ الإعدادات':'Save Settings')+'</button><button class="btn" id="acC" style="width:100%;color:var(--rd);border-color:var(--rd)">'+(L==='ar'?'مسح كل البيانات':'Clear All Data')+'</button></div>';$('acS').onclick=function(){var ns={name:$('acN').value,email:$('acE').value,fontScale:$('acF').value,viewWidth:$('acW').value};sv('sp_settings',ns);document.documentElement.style.fontSize=ns.fontScale;document.documentElement.style.setProperty('--m-width', ns.viewWidth);toast('✅');};$('acC').onclick=function(){if(!confirm('Sure?'))return;localStorage.removeItem('salesData');localStorage.removeItem('targetData');localStorage.removeItem('accCats') function rBk(){$('M').innerHTML='<div class="ph"><h1>💾 '+t('backup')+'</h1><p>'+(L==='ar'?'نسخ احتياطي محلي وسحابي':'Local & Cloud Backup')+'</p></div><div class="kg"><div class="bk-c card" id="b1"><span class="bki" style="font-size:2rem;margin-bottom:8px;display:block">💻</span><div><h4 style="color:var(--ac)">JSON</h4><p style="font-size:.7rem;color:var(--tx2)">Download Backup</p></div></div><div class="bk-c card" id="b2"><span class="bki" style="font-size:2rem;margin-bottom:8px;display:block">📊</span><div><h4 style="color:var(--gn)">Excel</h4><p style="font-size:.7rem;color:var(--tx2)">Export Excel</p></div></div><div class="bk-c card" id="b3"><span class="bki" style="font-size:2rem;margin-bottom:8px;display:block">☁️</span><div><h4 style="color:var(--bl)">Sync UP</h4><p style="font-size:.7rem;color:var(--tx2)">Save to Google Drive</p></div></div><div class="bk-c card" id="b4"><span class="bki" style="font-size:2rem;margin-bottom:8px;display:block">⬇️</span><div><h4 style="color:var(--am)">Sync DOWN</h4><p style="font-size:.7rem;color:var(--tx2)">Load from Google Drive</p></div></div><div class="bk-c card" id="b5"><span class="bki" style="font-size:2rem;margin-bottom:8px;display:block">🔄</span><div><h4 style="color:var(--rd)">Restore</h4><p style="font-size:.7rem;color:var(--tx2)">Upload JSON Local</p></div></div></div><input type="file" id="rF" accept=".json" style="display:none">';$('b1').onclick=function(){var d={salesData:S,targetData:T,accCats:accCats,hwCats:hwCats,payData:C,duesData:D};var b=new Blob([JSON.stringify(d)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='sales-pro-backup.json';a.click();toast('✅');};$('b2').onclick=function(){var wb=XLSX.utils.book_new();if(S.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S),'Sales');if(T.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(T),'Targets');XLSX.writeFile(wb,'sales-pro.xlsx');toast('✅');};$('b3').onclick=drvUpload;$('b4').onclick=drvDownload;$('b5').onclick=function(){$('rF').click();};$('rF').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.salesData){S=d.salesData;sv('salesData',S);}if(d.targetData){T=d.targetData;sv('targetData',T);}if(d.accCats){accCats=d.accCats;sv('accCats',accCats);}if(d.hwCats){hwCats=d.hwCats;sv('hwCats',hwCats);}if(data.payData){C=data.payData;sv('payData',C);}if(data.duesData){D=data.duesData;sv('duesData',D);}toast('✅');render();}catch(e){toast('Error');}};r.readAsText(f);};}

function rSetup(){$('M').innerHTML='<div class="ph"><h1>📂 '+t('setup')+'</h1></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px"><div><h3 style="font-size:.62rem;font-weight:700;margin-bottom:5px">📊 Sales</h3><div class="upload-z'+(S.length?' ok':'')+'" id="u1"><p>'+(S.length?'✅ '+S.length:'📂 Click')+'</p></div><input type="file" id="f1" accept=".xlsx,.xls,.csv"></div><div><h3 style="font-size:.62rem;font-weight:700;margin-bottom:5px">🎯 Targets</h3><div class="upload-z'+(T.length?' ok':'')+'" id="u2"><p>'+(T.length?'✅ '+T.length:'📂 Click')+'</p></div><input type="file" id="f2" accept=".xlsx,.xls,.csv"></div></div><div class="card"><strong>Status:</strong> '+(S.length?'✅ Sales ('+S.length+')':'❌')+' | '+(T.length?'✅ Targets ('+T.length+')':'❌')+'</div>';function norm(o){var u={};for(var k in o){var l=k.toLowerCase().trim();if((l.indexOf('customer')>-1||l.indexOf('عميل')>-1)&&l.indexOf('class')===-1&&l.indexOf('type')===-1&&l.indexOf('location')===-1)u['Customer']=o[k];if(l.indexOf('sales after')>-1||l.indexOf('net sales')>-1||l.indexOf('صافي')>-1||l.indexOf('sales')>-1)u['Sales After Discount']=o[k];if(l.indexOf('profit')>-1||l.indexOf('ربح')>-1)u['Profit Margin']=o[k];if(l.indexOf('class')>-1||l.indexOf('region')>-1||l.indexOf('فئة')>-1)u['Customer Class']=o[k];if(l.indexOf('item class name')>-1||l.indexOf('item group')>-1||l.indexOf('صنف')>-1)u['Item Group']=o[k];if(l.indexOf('target')>-1||l.indexOf('تارجت')>-1||l.indexOf('هدف')>-1)u['Target']=o[k];u[k.trim()]=o[k];}return u;}$('u1').onclick=function(){$('f1').click();};$('u2').onclick=function(){$('f2').click();};$('f1').onchange=function(e){var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){try{var wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});var sh=wb.Sheets[wb.SheetNames[0]];fixSheet(sh);var raw=XLSX.utils.sheet_to_json(sh,{defval:null});S=raw.map(norm).filter(function(r){return r.Customer!=null&&r['Sales After Discount']
